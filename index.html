<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyeongmyeong Jo | Personal Site</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Profile Card */
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        /* Profile Picture */
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #007bff;
            margin-bottom: 1rem;
        }

        h1 { margin: 10px 0; color: #222; }
        p { line-height: 1.6; color: #666; }

        /* Social Media Links */
        .social-links {
            margin-top: 20px;
        }

        .social-links a {
            display: inline-block;
            margin: 0 10px;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .social-links a:hover {
            transform: scale(1.1);
            color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Replace the URL below with your own picture link later -->
        <img src="https://placeholder.com" alt="Kyeongmyeong Jo" class="profile-pic">
        
        <h1>Kyeongmyeong Jo</h1>
        <p>Hello! I'm a developer learning the ropes of web design. Welcome to my simple corner of the internet hosted on GitHub Pages.</p>

        <div class="social-links">
            <a href="https://github.com" target="_blank">GitHub</a>
            <a href="https://linkedin.com" target="_blank">LinkedIn</a>
            <a href="https://instagram.com" target="_blank">Instagram</a>
        </div>
    </div>

</body>
</html>

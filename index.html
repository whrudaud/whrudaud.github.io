    <title>Kyeongmyeong Jo | Personal Site</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Bio */
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        /* Profile Picture */
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #007bff;
            margin-bottom: 1rem;
        }

        h1 { margin: 10px 0; color: #222; }
        p { line-height: 1.6; color: #666; }

        /* Personal Links */
        .personal_links {
            margin-top: 20px;
        }

        .personal_links a {
            display: inline-block;
            margin: 0 10px;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .personal_links a:hover {
            transform: scale(1.1);
            color: #0056b3;
        }

        .navbar {
            background-color: #333;
            padding: 1rem;
            margin-bottom: 20px;
        }

        .navbar ul {
            list-style-type: none; /* Removes bullet points */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .navbar li {
            margin: 0 15px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .navbar a:hover {
            color: #007bff; /* Highlights the link on hover */
        }
    </style>
</head>
